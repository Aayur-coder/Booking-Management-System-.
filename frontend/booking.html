<!DOCTYPE html>
<html>
<head>
  <title>Create Booking</title>
</head>
<body>
  <h2>Create Booking</h2>

  <input id="userId" placeholder="User ID"><br><br>
  <input id="resource" placeholder="Resource"><br><br>
  <input id="date" placeholder="Date"><br><br>
  <input id="time" placeholder="Time"><br><br>

  <button onclick="createBooking()">Book</button>
  <br><br>
  <a href="view.html">View Bookings</a>

  <script>
    async function createBooking() {
      const userId = document.getElementById("userId").value;
      const resource = document.getElementById("resource").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;

      const res = await fetch("http://localhost:5000/api/bookings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userId, resource, date, time })
      });

      const data = await res.json();
      alert("Booking created!");
      console.log(data);
    }
  </script>
</body>
</html>
