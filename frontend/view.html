<!DOCTYPE html>
<html>
<head>
  <title>View Bookings</title>
</head>
<body>
  <h2>All Bookings</h2>

  <button onclick="getBookings()">Load Bookings</button>
  <ul id="list"></ul>

  <script>
    async function getBookings() {
      const res = await fetch("http://localhost:5000/api/bookings");
      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(b => {
        const li = document.createElement("li");
        li.innerText = `${b.resource} | ${b.date} | ${b.time}`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
